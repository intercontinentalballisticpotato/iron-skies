kind = "web"
previewPath = "/"
title = "Retro Flight Simulator"
version = "1.0.0"
id = "artifacts/retro-flight-sim"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24889

[services.development]
run = "pnpm --filter @workspace/retro-flight-sim run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/retro-flight-sim", "run", "build" ]
publicDir = "artifacts/retro-flight-sim/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24889"
BASE_PATH = "/"
